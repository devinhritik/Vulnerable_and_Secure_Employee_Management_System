<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmpManager - {% block title %}Home{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .navbar { background: #1a1a2e !important; }
        .navbar-brand { color: #e94560 !important; font-weight: bold; font-size: 1.4rem; }
        .nav-link { color: #ccc !important; }
        .nav-link:hover { color: #e94560 !important; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .btn-danger { background: #e94560; border: none; }
        .sidebar { background: #16213e; min-height: 100vh; padding-top: 20px; }
        .sidebar a { color: #aaa; text-decoration: none; display: block; padding: 10px 20px; }
        .sidebar a:hover { background: #0f3460; color: white; }
        .badge-admin { background: #e94560; }
        .badge-manager { background: #f39c12; }
        .badge-employee { background: #27ae60; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid px-4">
        <a class="navbar-brand" href="/dashboard/">🔒 EmpManager</a>
        <div class="d-flex align-items-center gap-3">
            {% if user.is_authenticated %}
                <span class="text-light">👤 {{ user.username }}</span>
                <a href="/search/" class="btn btn-sm btn-outline-light">🔍 Search</a>
                <a href="/admin-panel/" class="btn btn-sm btn-outline-warning">⚙ Admin</a>
                <a href="/logout/" class="btn btn-sm btn-outline-danger">Logout</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
