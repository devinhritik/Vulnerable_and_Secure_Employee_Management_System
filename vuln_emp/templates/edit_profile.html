{% extends 'base.html' %}
{% block title %}Edit Profile{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card p-4">
            <h4>✏️ Edit Profile</h4>
            <div class="alert alert-warning small">
                ⚠️ Bio is stored and rendered as raw HTML — Stored XSS vulnerability!
                Try: <code>&lt;script&gt;alert('XSS')&lt;/script&gt;</code>
            </div>

            <form method="POST" action="/edit-profile/">
                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" name="phone" class="form-control" value="{{ employee.phone }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <textarea name="address" class="form-control">{{ employee.address }}</textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Bio (HTML allowed — XSS!)</label>
                    <textarea name="bio" class="form-control" rows="5">{{ employee.bio }}</textarea>
                </div>
                <button type="submit" class="btn btn-danger">Save Changes</button>
                <a href="/dashboard/" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
