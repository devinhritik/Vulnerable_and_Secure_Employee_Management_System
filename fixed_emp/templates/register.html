{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card p-4">
            <h3 class="text-center mb-4">📝 Create Account</h3>

            {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/register/">
                {% csrf_token %}  <!-- ✅ FIX #8 — CSRF token -->
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Bio</label>
                    <textarea name="bio" class="form-control" rows="3"
                        placeholder="Tell us about yourself..."></textarea>
                    <!-- ✅ FIX #4 — No XSS hint. Bio is stored and auto-escaped on output. -->
                </div>
                <!--
                    ✅ FIX #6 — Role dropdown REMOVED.
                    All new users are created as 'employee' by the server.
                    No user input can influence the role field.
                -->

                <button type="submit" class="btn btn-success w-100">Register</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
